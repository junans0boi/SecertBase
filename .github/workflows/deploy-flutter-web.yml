name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        working-directory: apps/secret_base_app
        run: flutter pub get

      - name: Verify formatting
        working-directory: apps/secret_base_app
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze code
        working-directory: apps/secret_base_app
        run: flutter analyze

      - name: Run tests
        working-directory: apps/secret_base_app
        run: flutter test

      - name: Build web
        working-directory: apps/secret_base_app
        env:
          SOCKET_URL: ${{ vars.SOCKET_URL }}
        run: |
          DEFINE_ARGS=""
          if [ -n "$SOCKET_URL" ]; then
            DEFINE_ARGS="--dart-define=SOCKET_URL=$SOCKET_URL"
          fi
          flutter build web --release --base-href "/SecertBase/" --no-wasm-dry-run $DEFINE_ARGS

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/secret_base_app/build/web

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
